name: Generate Profile Assets

on:
  schedule:
    - cron: "0 0,6,12,18 * * *"
  push:
    branches:
      - main
  workflow_dispatch:

concurrency:
  group: profile-assets
  cancel-in-progress: false

jobs:
  generate:
    runs-on: ubuntu-latest
    timeout-minutes: 25
    permissions:
      contents: write

    steps:
      - name: Checkout main
        uses: actions/checkout@v4

      - name: Fetch previous assets
        uses: actions/checkout@v4
        with:
          ref: output
          path: output-branch
        continue-on-error: true

      - name: Prepare workspace
        run: |
          mkdir -p dist/stats dist/badges
          if [ -d output-branch ]; then
            cp -rn output-branch/. dist/ 2>/dev/null || true
          fi
          mkdir -p dist/stats dist/badges

      - name: Generate GitHub Stats card
        uses: stats-organization/github-readme-stats-action@v2
        with:
          card: stats
          options: username=Mayur-Purohit&show_icons=true&include_all_commits=true&hide_border=true&bg_color=1a0b2e&title_color=F472B6&icon_color=EC4899&text_color=FBCFE8&ring_color=A855F7&rank_icon=github
          path: dist/stats/github-stats.svg
          token: ${{ secrets.GITHUB_TOKEN }}

      - name: Generate Top Languages card
        uses: stats-organization/github-readme-stats-action@v2
        with:
          card: top-langs
          options: username=Mayur-Purohit&layout=compact&include_all_commits=true&langs_count=8&hide_border=true&bg_color=1a0b2e&title_color=F472B6&text_color=FBCFE8&icon_color=EC4899
          path: dist/stats/top-languages.svg
          token: ${{ secrets.GITHUB_TOKEN }}

      - name: Generate Streak and Activity graph
        run: |
          fetch_svg() {
            url="$1"
            out="$2"
            for attempt in 1 2 3 4 5; do
              if curl -fsSL --retry 3 --retry-delay 8 --max-time 120 \
                -A "Mayur-Purohit-profile-assets" -o "$out" "$url" && grep -qi "<svg" "$out"; then
                echo "OK: $out (attempt $attempt)"
                return 0
              fi
              echo "Retry $attempt for $out"
              sleep 12
            done
            return 1
          }

          STREAK_URL="https://streak-stats.demolab.com?user=Mayur-Purohit&hide_border=true&background=1A0B2E&ring=A855F7&fire=EC4899&currStreakLabel=F472B6&sideLabels=C084FC&dates=F9A8D4&currStreakNum=FBCFE8&sideNums=FBCFE8&stroke=7C3AED"
          GRAPH_URL="https://github-readme-activity-graph.vercel.app/graph?username=Mayur-Purohit&bg_color=1a0b2e&color=EC4899&line=A855F7&point=F472B6&area_color=F472B6&area=true&hide_border=true&custom_title=Mayur%27s%20Contribution%20Activity"

          fetch_svg "$STREAK_URL" dist/stats/github-streak.svg || test -f dist/stats/github-streak.svg
          fetch_svg "$GRAPH_URL" dist/contribution-graph.svg || test -f dist/contribution-graph.svg

      - name: Generate Contribution Snake
        uses: Platane/snk/svg-only@v3
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        with:
          github_user_name: Mayur-Purohit
          outputs: |
            dist/github-contribution-grid-snake.svg
            dist/github-contribution-grid-snake-dark.svg?palette=github-dark&color_snake=EC4899

      - name: Generate premium gradient badges
        run: |
          UPDATED=$(date -u +"%Y-%m-%d %H:%M UTC")
          echo "$UPDATED" > dist/last-updated.txt

          cat > dist/badges/auto-sync.svg << 'SVGEOF'
          <svg xmlns="http://www.w3.org/2000/svg" width="200" height="32" role="img" aria-label="Live data auto synced">
            <defs>
              <linearGradient id="g" x1="0%" y1="0%" x2="100%" y2="0%">
                <stop offset="0%" stop-color="#7C3AED"/>
                <stop offset="50%" stop-color="#A855F7"/>
                <stop offset="100%" stop-color="#EC4899"/>
              </linearGradient>
            </defs>
            <rect width="200" height="32" rx="8" fill="#1a0b2e" stroke="url(#g)" stroke-width="1.5"/>
            <circle cx="18" cy="16" r="5" fill="#22c55e"/>
            <text x="108" y="20" fill="#FBCFE8" font-family="Segoe UI,system-ui,sans-serif" font-size="12" font-weight="600" text-anchor="middle">LIVE · AUTO-SYNC</text>
          </svg>
          SVGEOF

          cat > dist/badges/last-updated.svg << SVGEOF
          <svg xmlns="http://www.w3.org/2000/svg" width="280" height="32" role="img" aria-label="Last updated">
            <defs>
              <linearGradient id="g2" x1="0%" y1="0%" x2="100%" y2="0%">
                <stop offset="0%" stop-color="#EC4899"/>
                <stop offset="100%" stop-color="#F472B6"/>
              </linearGradient>
            </defs>
            <rect width="280" height="32" rx="8" fill="#1a0b2e" stroke="url(#g2)" stroke-width="1.5"/>
            <text x="18" y="20" fill="#C084FC" font-family="Segoe UI,system-ui,sans-serif" font-size="11" font-weight="600">UPDATED</text>
            <text x="95" y="20" fill="#FBCFE8" font-family="Segoe UI,system-ui,sans-serif" font-size="11" font-weight="500">${UPDATED}</text>
          </svg>
          SVGEOF

      - name: Verify required SVGs
        run: |
          for f in dist/stats/github-stats.svg dist/stats/top-languages.svg \
            dist/stats/github-streak.svg dist/contribution-graph.svg \
            dist/github-contribution-grid-snake.svg dist/github-contribution-grid-snake-dark.svg \
            dist/badges/last-updated.svg dist/badges/auto-sync.svg; do
            if [ ! -f "$f" ]; then
              echo "Missing: $f"
              exit 1
            fi
            if [[ "$f" == *.svg ]] && ! grep -qi "<svg" "$f"; then
              echo "Invalid SVG: $f"
              exit 1
            fi
            echo "Verified: $f"
          done

      - name: Publish to output branch
        uses: crazy-max/ghaction-github-pages@v4
        with:
          target_branch: output
          build_dir: dist
          keep_history: true
          commit_message: "chore: refresh profile analytics [skip ci]"
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
