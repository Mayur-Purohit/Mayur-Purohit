name: Generate Profile Assets

on:
  schedule:
    - cron: "0 0,6,12,18 * * *"
  push:
    branches:
      - main
  workflow_dispatch:

concurrency:
  group: profile-assets
  cancel-in-progress: false

jobs:
  generate:
    runs-on: ubuntu-latest
    timeout-minutes: 25
    permissions:
      contents: write

    steps:
      - name: Checkout main
        uses: actions/checkout@v4

      # ── Auto-update B.Tech year in README ──────────────────────
      # Enrollment: August 2024. Calculates year dynamically.
      - name: Update B.Tech year in README
        run: |
          ENROLL_YEAR=2024
          ENROLL_MONTH=8
          CURRENT_YEAR=$(date -u +%Y)
          CURRENT_MONTH=$(date -u +%-m)

          # Calculate academic year (year increments each August)
          YEARS_PASSED=$(( CURRENT_YEAR - ENROLL_YEAR ))
          if [ "$CURRENT_MONTH" -lt "$ENROLL_MONTH" ]; then
            YEARS_PASSED=$(( YEARS_PASSED - 1 ))
          fi
          BTECH_YEAR=$(( YEARS_PASSED + 1 ))

          # Clamp to 1-4 range
          if [ "$BTECH_YEAR" -lt 1 ]; then BTECH_YEAR=1; fi
          if [ "$BTECH_YEAR" -gt 4 ]; then BTECH_YEAR=4; fi

          # Ordinal suffix
          case $BTECH_YEAR in
            1) ORDINAL="1st" ;;
            2) ORDINAL="2nd" ;;
            3) ORDINAL="3rd" ;;
            4) ORDINAL="4th" ;;
          esac

          echo "Calculated B.Tech year: ${ORDINAL} Year"

          # URL-encoded year for typing animation
          TYPING_LINE="%F0%9F%8E%93+${ORDINAL}+Year+B.Tech+CS+%E2%80%A2+Full+Stack+Developer"
          TYPING_IMG="<img src=\"https://readme-typing-svg.demolab.com?font=Fira+Code&weight=600&size=22&duration=3500&pause=1200&color=C084FC&center=true&vCenter=true&repeat=true&width=650&height=45&lines=${TYPING_LINE};%F0%9F%9A%80+React+%7C+Node.js+%7C+Python+%7C+Java;%F0%9F%92%A1+Passionate+about+building+impactful+software;%F0%9F%A4%9D+Open+to+Internships+%26+Opportunities\" alt=\"Typing Animation\" />"

          # Badge URL
          BADGE_IMG="<img src=\"https://img.shields.io/badge/🎓_B.Tech_CS_—_${ORDINAL}_Year-7C3AED?style=for-the-badge&labelColor=0d1117\" alt=\"Education\" />"

          # Escape ampersands for sed
          TYPING_IMG_ESCAPED="${TYPING_IMG//&/\\&}"
          BADGE_IMG_ESCAPED="${BADGE_IMG//&/\\&}"

          # Update typing animation line
          sed -i "s|<!--TYPING_YEAR_START-->.*<!--TYPING_YEAR_END-->|<!--TYPING_YEAR_START-->${TYPING_IMG_ESCAPED}<!--TYPING_YEAR_END-->|g" README.md

          # Update about me text
          sed -i "s|<!--ABOUT_YEAR_START-->.*<!--ABOUT_YEAR_END-->|<!--ABOUT_YEAR_START-->${ORDINAL} Year<!--ABOUT_YEAR_END-->|g" README.md

          # Update badge
          sed -i "s|<!--BADGE_YEAR_START-->.*<!--BADGE_YEAR_END-->|<!--BADGE_YEAR_START-->${BADGE_IMG_ESCAPED}<!--BADGE_YEAR_END-->|g" README.md

          echo "README updated with ${ORDINAL} Year"

      - name: Commit README if changed
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add README.md
          git diff --cached --quiet && echo "No README changes" || \
            git commit -m "chore: auto-update B.Tech year [skip ci]" && git push

      - name: Prepare workspace
        run: mkdir -p dist/stats

      # Purple Aura: #7C3AED · #A855F7 · #C084FC
      - name: Generate GitHub Stats card
        uses: stats-organization/github-readme-stats-action@v2
        with:
          card: stats
          options: username=Mayur-Purohit&show_icons=true&include_all_commits=true&hide_border=true&bg_color=0d1117&title_color=C084FC&icon_color=A855F7&text_color=c9d1d9&ring_color=7C3AED&rank_icon=github
          path: dist/stats/github-stats.svg
          token: ${{ secrets.GITHUB_TOKEN }}

      - name: Generate Top Languages card
        uses: stats-organization/github-readme-stats-action@v2
        with:
          card: top-langs
          options: username=Mayur-Purohit&layout=compact&include_all_commits=true&langs_count=10&hide_border=true&bg_color=0d1117&title_color=C084FC&text_color=c9d1d9
          path: dist/stats/top-languages.svg
          token: ${{ secrets.GITHUB_TOKEN }}

      - name: Generate Streak card
        run: |
          curl -fsSL --retry 5 -o dist/stats/github-streak.svg \
            "https://streak-stats.demolab.com?user=Mayur-Purohit&hide_border=true&background=0D1117&ring=7C3AED&fire=C084FC&currStreakLabel=A855F7&sideLabels=C084FC&dates=555555&currStreakNum=c9d1d9&sideNums=c9d1d9&stroke=7C3AED"
          grep -qi "<svg" dist/stats/github-streak.svg

      - name: Generate Contribution Snake
        uses: Platane/snk/svg-only@v3
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        with:
          github_user_name: Mayur-Purohit
          outputs: |
            dist/github-contribution-grid-snake.svg
            dist/github-contribution-grid-snake-dark.svg?palette=github-dark

      - name: Verify generated SVGs
        run: |
          for f in dist/stats/github-stats.svg dist/stats/top-languages.svg \
            dist/stats/github-streak.svg \
            dist/github-contribution-grid-snake.svg dist/github-contribution-grid-snake-dark.svg; do
            if [ ! -f "$f" ] || ! grep -qi "<svg" "$f"; then
              echo "Invalid or missing: $f"
              exit 1
            fi
            echo "OK: $f"
          done

      - name: Publish to output branch
        uses: crazy-max/ghaction-github-pages@v4
        with:
          target_branch: output
          build_dir: dist
          keep_history: false
          commit_message: "chore: refresh profile stats and snake [skip ci]"
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
