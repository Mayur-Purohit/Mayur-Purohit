name: Generate Profile Assets

on:
  schedule:
    - cron: "0 */6 * * *"
  push:
    branches:
      - main
  workflow_dispatch:

jobs:
  generate:
    runs-on: ubuntu-latest
    timeout-minutes: 15
    permissions:
      contents: write

    steps:
      - name: Checkout main
        uses: actions/checkout@v4

      - name: Fetch output branch
        uses: actions/checkout@v4
        with:
          ref: output
          path: output-branch
        continue-on-error: true

      - name: Merge previous output into dist
        run: |
          if [ -d output-branch ]; then
            cp -rn output-branch/. dist/ 2>/dev/null || true
          fi
          mkdir -p dist/stats

      # ═══════════════ GITHUB STATS (no external Vercel) ═══════════════
      - name: Generate GitHub Stats card
        uses: stats-organization/github-readme-stats-action@v2
        with:
          card: stats
          options: username=Mayur-Purohit&show_icons=true&include_all_commits=true&count_private=true&hide_border=true&bg_color=0d1117&title_color=C084FC&icon_color=A855F7&text_color=c9d1d9&ring_color=7C3AED&rank_icon=github
          path: dist/stats/github-stats.svg
          token: ${{ secrets.GITHUB_TOKEN }}

      - name: Generate Top Languages card
        uses: stats-organization/github-readme-stats-action@v2
        with:
          card: top-langs
          options: username=Mayur-Purohit&layout=compact&include_all_commits=true&count_private=true&langs_count=8&hide_border=true&bg_color=0d1117&title_color=C084FC&text_color=c9d1d9&icon_color=A855F7
          path: dist/stats/top-languages.svg
          token: ${{ secrets.GITHUB_TOKEN }}

      # ═══════════════ CONTRIBUTION SNAKE ═══════════════
      - name: Generate Snake Animation
        uses: Platane/snk/svg-only@v3
        with:
          github_user_name: Mayur-Purohit
          outputs: |
            dist/github-contribution-grid-snake.svg
            dist/github-contribution-grid-snake-dark.svg?palette=github-dark

      - name: Verify generated SVGs
        run: |
          for f in dist/stats/github-stats.svg dist/stats/top-languages.svg \
            dist/github-contribution-grid-snake.svg dist/github-contribution-grid-snake-dark.svg; do
            if ! grep -q "<svg" "$f"; then
              echo "Invalid or missing SVG: $f"
              exit 1
            fi
            echo "OK: $f"
          done

      - name: Push all assets to output branch
        uses: crazy-max/ghaction-github-pages@v4
        with:
          target_branch: output
          build_dir: dist
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
