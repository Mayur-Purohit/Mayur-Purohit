name: Generate Profile Assets

on:
  schedule:
    - cron: "0 0,6,12,18 * * *"
  push:
    branches:
      - main
  workflow_dispatch:

concurrency:
  group: profile-assets
  cancel-in-progress: false

jobs:
  generate:
    runs-on: ubuntu-latest
    timeout-minutes: 25
    permissions:
      contents: write

    steps:
      - name: Checkout main
        uses: actions/checkout@v4

      - name: Fetch previous assets
        uses: actions/checkout@v4
        with:
          ref: output
          path: output-branch
        continue-on-error: true

      - name: Prepare workspace
        run: |
          mkdir -p dist/stats
          if [ -d output-branch ]; then
            cp -rn output-branch/. dist/ 2>/dev/null || true
          fi
          mkdir -p dist/stats

      # Purple Aura theme: #7C3AED · #A855F7 · #C084FC
      - name: Generate GitHub Stats card
        uses: stats-organization/github-readme-stats-action@v2
        with:
          card: stats
          options: username=Mayur-Purohit&show_icons=true&include_all_commits=true&hide_border=true&bg_color=0d1117&title_color=C084FC&icon_color=A855F7&text_color=c9d1d9&ring_color=7C3AED&rank_icon=github
          path: dist/stats/github-stats.svg
          token: ${{ secrets.GITHUB_TOKEN }}

      - name: Generate Top Languages card
        uses: stats-organization/github-readme-stats-action@v2
        with:
          card: top-langs
          options: username=Mayur-Purohit&layout=compact&include_all_commits=true&langs_count=10&hide_border=true&bg_color=0d1117&title_color=C084FC&text_color=c9d1d9
          path: dist/stats/top-languages.svg
          token: ${{ secrets.GITHUB_TOKEN }}

      - name: Generate Contribution Snake
        uses: Platane/snk/svg-only@v3
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        with:
          github_user_name: Mayur-Purohit
          outputs: |
            dist/github-contribution-grid-snake.svg
            dist/github-contribution-grid-snake-dark.svg?palette=github-dark&color_snake=C084FC

      - name: Verify generated SVGs
        run: |
          for f in dist/stats/github-stats.svg dist/stats/top-languages.svg \
            dist/github-contribution-grid-snake.svg dist/github-contribution-grid-snake-dark.svg; do
            if [ ! -f "$f" ] || ! grep -qi "<svg" "$f"; then
              echo "Invalid or missing: $f"
              exit 1
            fi
            echo "OK: $f"
          done

      - name: Publish to output branch
        uses: crazy-max/ghaction-github-pages@v4
        with:
          target_branch: output
          build_dir: dist
          keep_history: true
          commit_message: "chore: refresh profile stats and snake [skip ci]"
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
